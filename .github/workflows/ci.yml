# SPDX-License-Identifier: MIT

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  license-headers:
    name: license headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SPDX headers on every source file
        run: bash scripts/check-license-headers.sh

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dev deps
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check src/ tools/ tests/ scripts/
      - name: Ruff format check
        run: uv run ruff format --check src/ tools/ tests/ scripts/

  test-unit:
    name: unit tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dev + train + export extras
        run: uv sync --extra dev --extra train --extra export

      - name: Install CLI package
        run: uv pip install -e tools/cli

      - name: Unit tests
        run: uv run pytest tests/unit -m "not slow"

      - name: Integration tests
        run: uv run pytest tests/integration -m "not slow"
