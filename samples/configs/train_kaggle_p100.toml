# SPDX-License-Identifier: MIT
#
# Reduced-scope training config for Kaggle Notebooks free tier.
#
# HISTORY / rename note: file is still called `train_kaggle_p100.toml`
# because the notebook harness pins to this exact filename. In practice
# Kaggle's P100 has been retired for PyTorch 2.10+ (compute capability
# 6.0 dropped), so the actual target now is 1x NVIDIA T4 (16 GB HBM2,
# compute 7.5) picked out of the T4x2 slot. Voidface's training loop
# is not DDP-wired so only one of the two T4s is used.
#
# Purpose of this file
# --------------------
# MVP "grant application" run — enough training to demonstrate the
# bilevel + GFPGAN inner-loop objective learns something, not a full
# R5.5 ship candidate. Three things fall out of that constraint:
#
#   * Only 2 target families kept: detector + recognizer.
#     Every VAE + CLIP target is disabled. Empirically the SD 1.5
#     VAE forward at res 384 alone consumed ~5 GB of activation
#     memory on T4, which OOMs before the first PGD step even
#     completes. Diffusion re-encoding coverage returns in R5.5.
#   * The `sd15-vae` restorer is dropped from the sampler because
#     it depends on the VAE target being loaded.
#   * Steps = 20k (down from 30k). At an estimated ~5 s/step on T4
#     that lands around 28 wall-clock hours, i.e. ~3 Kaggle sessions
#     spread across the 30 h/week free quota.
#
# What the reduced ensemble buys us
# ---------------------------------
# The bilevel-with-GFPGAN loop — voidface's novel contribution — is
# preserved: GFPGAN v1.4 still runs inside the inner loop as the
# restorer being adversarially attacked. That's the shipping story
# for the grant application, so it stays.
#
# What we lose: cross-target transfer to VAE-family attackers
# (InstantID's SDXL denoiser, PhotoMaker's SDXL branch, IP-Adapter's
# CLIP-image path). These come back at R5.5 on paid H100 with the
# full 5-target ensemble.
#
# See also:
#   * samples/configs/train_full.toml      — R5.5 reference
#   * Documentation/training/overview.md
#   * Documentation/training/bilevel-adversarial.md
#   * Documentation/training/normalize.md
#   * Documentation/training/kaggle-p100.md — the setup guide

[experiment]
name = "kaggle-t4-mvp"
seed = 0
# 20k steps is the grant-application MVP scope with the reduced
# ensemble. Enough for detector + recognizer to visibly separate
# from baseline, not enough for a shipped generator. R5.5 uses 200k.
steps = 20_000
# Compact per-step line every 25 steps. At ~5 s/step that's a
# heartbeat every ~2 min.
log_every = 25
# Checkpoint every 500 steps (~42 min). 5.35 M param G checkpoint is
# <50 MB — cheap to keep, cheap to push to a Kaggle Dataset between
# sessions.
checkpoint_every = 500
# Write checkpoints under Kaggle's per-session writable dir.
checkpoint_dir = "/kaggle/working/runs/kaggle-t4-mvp"

[data]
# Attach an FFHQ dataset in the notebook sidebar (arnaud58/flickrfaces-
# hq-dataset-ffhq works, or any FFHQ mirror on Kaggle). Kaggle's
# nested mount lands at whatever the notebook auto-detects; the
# harness overrides this at runtime, so the value here is a
# placeholder.
directory = "/kaggle/input/ffhq"
# 256, not 384. Two reasons:
#   * Cuts activation memory ~44% vs res 384 (256^2 / 384^2 = 0.44).
#     Combined with dropping VAE, this is what fits GFPGAN + bilevel
#     LPIPS on a 16 GB T4.
#   * FFHQ 256x256 mirrors on Kaggle are ~2 GB (vs ~20 GB for 512+)
#     so the dataset mounts faster.
resolution = 256
# Batch 1. Anything larger hits OOM on T4 with GFPGAN in the inner
# loop even after dropping VAE, at res 256, with grad checkpointing.
# For effective batch > 1, use gradient accumulation in the training
# loop rather than raising this.
batch_size = 1
augment = true

[optim]
# LR unchanged from R5.5.
learning_rate = 1e-4
weight_decay = 1e-6
# 12/255 = 0.047 — standard voidface perturbation budget.
epsilon_frac = 0.047
# 1 EOT sample per step at this scope. R5.5 uses k=4.
eot_samples = 1
# Gradient checkpointing on GFPGAN's synthesis blocks. Essential —
# without it, GFPGAN forward on 512x512 aligned crops needs ~6 GB
# of activation memory alone.
gradient_checkpointing = true

[loss]
# Bilevel LPIPS between restorer(clean) and restorer(perturbed).
# MAXIMIZED (negative sign). The delta that survives GFPGAN is the
# delta we want.
bilevel_lpips = 0.05

# Per-target EMA normalization. TRUE — RetinaFace suppression losses
# (~0.01-0.1) and ArcFace cosine losses (~0.5-2.0) differ by ~20x in
# scale. Without normalization the recognizer term would soak up
# essentially all backpropagated gradient.
normalize_per_target = true
normalization_ema_decay = 0.99

[loss.perceptual]
lpips_weight = 0.10
lpips_max = 0.05
tv_weight = 0.01

# --- Target ensemble --------------------------------------------------
#
# 2 of 5 target families kept. Everything VAE- and CLIP-related is
# off because they don't fit in T4 16 GB alongside GFPGAN.

[targets.detector]
enabled = true
weight = 0.45
# Slightly higher weight than R5.5 (0.35) since the recognizer is
# now doing double duty covering identity-space attacks.

[targets.recognizer]
enabled = true
weight = 0.55
# Higher than R5.5 (0.40) to compensate for the missing VAE targets.

[targets.vae]
# OFF. SD 1.5 VAE encoder at res 256 costs ~2.5 GB activation memory
# per forward, doubled by the bilevel loop's second encoding pass.
# Enable in R5.5.
enabled = false

[targets."sdxl-vae"]
enabled = false

[targets.openclip]
enabled = false

# --- Restorer sampler -------------------------------------------------
#
# `RestorerSampler` picks one restorer per step. sd15-vae restorer
# is dropped (needs the VAE target). identity + gfpgan retained.
# Rationale:
#
#   * identity = 0.5 — cheap ensemble step, prevents G from over-
#                      specializing to GFPGAN's specific artifacts.
#   * gfpgan   = 0.5 — the actual bilevel step, our novel loop.
#                      At batch 1 + res 256 + grad ckpt, GFPGAN
#                      forward+backward is ~2 s on T4.
[restorers]
identity = 0.5
gfpgan = 0.5

# --- Expectation Over Transformation ---------------------------------
#
# k=1 to save compute. Coverage over transforms (JPEG, resize, blur)
# matters more than sample count at MVP scope.
[eot]
k = 1
jpeg_qualities = [40, 70, 95]
resize_factors = [0.75, 1.0, 1.5]
gaussian_sigma = [0.0, 0.5, 1.0]
